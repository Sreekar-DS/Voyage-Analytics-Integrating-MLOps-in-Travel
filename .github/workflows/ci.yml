name: Voyage Analytics CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: voyage-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python validation and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile project Python
        run: |
          python -m compileall -q api src streamlit_app mlflow_tracking airflow/dags tests

      - name: Verify required model artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          required = [
              Path("models/flight_price_model.joblib"),
              Path("models/gender_classifier.joblib"),
              Path("models/hotel_recommender.joblib"),
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit(f"Missing model artifacts: {missing}")
          print("All required model artifacts are present.")
          PY

      - name: Run API tests
        run: python -m pytest -q

  docker-build:
    name: Docker build validation
    needs: python-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Flask API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: voyage-analytics-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
